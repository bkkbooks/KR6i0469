body:
  text: 大唐天竺三藏地婆訶羅譯如是我聞一時薄伽梵在室羅筏住誓多林給孤獨園與大苾芻衆千二百五十人俱復有無量菩薩摩訶薩衆爾時世尊告諸苾芻有四種法菩薩摩訶薩盡其壽量常應修行乃至雖遇喪命因緣亦不得捨何者為四諸苾芻菩薩盡壽乃至逢遇喪命因緣必定不得捨菩提心諸苾芻菩薩盡壽乃至逢遇喪命因緣必定不得捨善知識諸苾芻菩薩盡壽乃至逢遇喪命因緣不得棄捨堪忍愛樂諸苾芻菩薩盡壽乃至逢遇喪命因緣必定不得捨阿練若諸苾芻如是四法菩薩盡壽常應堅持寧喪身命而不捨離爾時世尊重演其義說伽他曰世間明慧者應發菩提心常思一切智恆近善知識住堪忍愛樂依止阿練若猶如師子王遠離諸驚怖諸明慧者修行此法速能超出衆魔羅網疾證無上正等菩提時薄伽梵說此經已諸苾芻等歡喜奉行
